<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿瑞制作</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 700px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .start-page, .quiz-page, .result-page, .wrong-page, .prize-page {
            display: none;
        }

        .start-page {
            display: block;
            text-align: center;
        }

        .start-page h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .start-page p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 题目导航条 */
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .nav-item {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-item.current {
            background: #764ba2;
            color: #fff;
        }
        .nav-item.answered {
            background: #4caf50;
            color: #fff;
        }
        .nav-item.wrong {
            background: #f44336;
            color: #fff;
        }

        .progress {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }

        .question h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            line-height: 1.5;
            border-left: 4px solid #764ba2;
            padding-left: 15px;
        }

        .options-list {
            list-style: none;
            margin-bottom: 25px;
        }

        .option-item {
            background: #f8f9fa;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 14px 18px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-item input {
            margin-right: 15px;
            transform: scale(1.2);
        }

        .option-item label {
            font-size: 15px;
            color: #444;
            width: 100%;
        }

        .ans-tip {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 15px;
            display: none;
        }

        .ans-right {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .ans-wrong {
            background: #ffebee;
            color: #c62828;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: linear-gradient(to right, #5a6edb, #6c3d8d);
        }

        .result-page, .wrong-page, .prize-page {
            text-align: center;
        }

        .result-page h2, .wrong-page h2, .prize-page h2 {
            font-size: 26px;
            color: #333;
            margin-bottom: 20px;
        }

        .score-box, .wrong-box {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .score-box p {
            font-size: 18px;
            margin: 10px 0;
            color: #555;
        }

        .wrong-item {
            margin: 12px 0;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
        }
        /* 视频样式适配 */
        video {
            width: 100%;
            border-radius: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 开始界面 -->
    <div class="start-page" id="startPage">
        <h1>计算机发展四代知识</h1>
        <p>阿瑞制作 · 没啥难度<br>支持云更新<br>全部正确，有神秘大奖</p>
        <button class="btn" onclick="startQuiz()">开始答题</button>
    </div>

    <!-- 答题界面 -->
    <div class="quiz-page" id="quizPage">
        <!-- 题目导航条 -->
        <div class="question-nav" id="questionNav"></div>

        <div class="progress">
            <span>第 <span id="currentNum">1</span> 题 / 共 <span id="totalNum">11</span> 题</span>
            <span>得分：<span id="score">0</span></span>
        </div>
        <div class="question">
            <h2 id="questionText">题目加载中...</h2>
        </div>
        <ul class="options-list" id="optionsList"></ul>
        <div id="ansTip" class="ans-tip"></div>
        <button class="btn" onclick="nextQuestion()">下一题</button>
    </div>

    <!-- 结果界面 -->
    <div class="result-page" id="resultPage">
        <h2>答题完成</h2>
        <div class="score-box">
            <p>总题数：<span id="total">11</span></p>
            <p>答对：<span id="right" style="color:green">0</span></p>
            <p>答错：<span id="wrong" style="color:red">0</span></p>
            <p>得分：<span id="finalScore" style="font-size:22px">0</span></p>
        </div>

        <!-- 全对才显示 -->
        <button class="btn" id="allRightBtn" style="background: linear-gradient(to right, #ff512f, #dd2476); display: none;" onclick="goToPrize()">进入神秘大奖</button>

        <button class="btn" onclick="showWrong()">查看错题</button>
        <button class="btn" onclick="restartQuiz()">重新答题</button>
    </div>

    <!-- 错题界面 -->
    <div class="wrong-page" id="wrongPage">
        <h2>错题列表</h2>
        <div class="wrong-box" id="wrongList"></div>
        <button class="btn" onclick="backToResult()">返回结果</button>
    </div>

    <!-- 大奖页面（已嵌入视频） -->
    <div class="prize-page" id="prizePage">
        <h2>🎉 恭喜获得神秘大奖 🎉</h2>
        <div style="margin: 30px 0;">
            <video controls width="100%">
                <source src="https://pan.axxpan.top/api/v3/file/get/75518/VID_20260311_203705.mp4?sign=Q4C-MScyMLt0aBYyQmDBLgQvgsyj-33YSW8iGnxkaUw%3D%3A0" type="video/mp4">
                你的浏览器不支持视频播放，请更换浏览器后重试
            </video>
        </div>
        <button class="btn" onclick="restartQuiz()">返回首页</button>
    </div>
</div>

<script>
    // 题库
    const questions = [
        { q: "世界上第一台计算机的英文名是什么？", a: "ENIAC", o: ["ENIAC", "UNIVAC", "EDVAC", "Apple"] },
        { q: "第一代计算机的核心元件是？", a: "电子管", o: ["电子管", "晶体管", "集成电路", "大规模集成电路"] },
        { q: "第一代计算机的年代是？", a: "1946-1957", o: ["1946-1957", "1958-1964", "1965-1971", "1971至今"] },
        { q: "第一代计算机主要应用是？", a: "军事科学计算", o: ["军事科学计算", "数据处理", "办公自动化", "人工智能"] },
        { q: "第二代计算机的核心元件是？", a: "晶体管", o: ["晶体管", "电子管", "集成电路", "大规模集成电路"] },
        { q: "第二代计算机主要特点是？", a: "体积小、功耗低", o: ["体积小、功耗低", "体积巨大易坏", "微型化", "智能化"] },
        { q: "第三代计算机的核心元件是？", a: "中小规模集成电路", o: ["中小规模集成电路", "电子管", "晶体管", "超大规模集成电路"] },
        { q: "第三代计算机的年代是？", a: "1965-1971", o: ["1965-1971", "1946-1957", "1958-1964", "1971至今"] },
        { q: "第四代计算机的核心元件是？", a: "大规模/超大规模集成电路", o: ["大规模/超大规模集成电路", "电子管", "晶体管", "集成电路"] },
        { q: "第四代计算机主要特点是？", a: "微型化、网络化、智能化", o: ["微型化、网络化、智能化", "体积巨大", "功耗极高", "速度慢"] },
        { q: "ENIAC 属于第几代计算机？", a: "第一代", o: ["第一代", "第二代", "第三代", "第四代"] }
    ];

    let current = 0;
    let score = 0;
    let right = 0;
    let wrong = 0;
    let wrongList = [];
    let shuffledQuestions = [];
    let userAnswers = []; // 记录每道题是否答对

    // 随机打乱数组
    function shuffle(arr) {
        let array = [...arr];
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 开始答题
    function startQuiz() {
        shuffledQuestions = shuffle(questions);
        current = 0;
        score = 0;
        right = 0;
        wrong = 0;
        wrongList = [];
        userAnswers = new Array(shuffledQuestions.length).fill(null);

        document.getElementById("startPage").style.display = "none";
        document.getElementById("quizPage").style.display = "block";
        document.getElementById("totalNum").innerText = shuffledQuestions.length;
        renderNav();
        renderQuestion();
    }

    // 渲染导航条
    function renderNav() {
        let nav = document.getElementById("questionNav");
        nav.innerHTML = "";
        shuffledQuestions.forEach((_, i) => {
            let dot = document.createElement("div");
            dot.className = "nav-item";
            if (i === current) dot.classList.add("current");
            if (userAnswers[i] === true) dot.classList.add("answered");
            if (userAnswers[i] === false) dot.classList.add("wrong");
            dot.innerText = i + 1;
            dot.onclick = () => jumpToQuestion(i);
            nav.appendChild(dot);
        });
    }

    // 跳题
    function jumpToQuestion(index) {
        current = index;
        renderNav();
        renderQuestion();
    }

    // 渲染题目
    function renderQuestion() {
        let q = shuffledQuestions[current];
        document.getElementById("questionText").innerText = q.q;
        document.getElementById("currentNum").innerText = current + 1;
        document.getElementById("score").innerText = score;

        let list = document.getElementById("optionsList");
        list.innerHTML = "";
        document.getElementById("ansTip").style.display = "none";

        let shuffledOptions = shuffle(q.o);

        shuffledOptions.forEach((item, i) => {
            let li = document.createElement("li");
            li.className = "option-item";
            let char = String.fromCharCode(65 + i);
            li.innerHTML = `
                <input type="radio" name="opt" id="o${i}" value="${item}">
                <label for="o${i}">${char}. ${item}</label>
            `;
            list.appendChild(li);
        });
    }

    // 下一题
    function nextQuestion() {
        let selected = document.querySelector('input[name="opt"]:checked');
        if (!selected) {
            alert("请选择答案！");
            return;
        }

        let q = shuffledQuestions[current];
        let tip = document.getElementById("ansTip");
        let isRight = selected.value === q.a;

        if (userAnswers[current] === null) {
            if (isRight) {
                right++;
                score += 10;
                userAnswers[current] = true;
            } else {
                wrong++;
                userAnswers[current] = false;
                wrongList.push({
                    q: q.q,
                    user: selected.value,
                    ans: q.a
                });
            }
        }

        if (isRight) {
            tip.className = "ans-tip ans-right";
            tip.innerText = "✅ 回答正确！";
        } else {
            tip.className = "ans-tip ans-wrong";
            tip.innerText = "❌ 错误，正确答案：" + q.a;
        }
        tip.style.display = "block";
        renderNav();

        setTimeout(() => {
            current++;
            if (current < shuffledQuestions.length) {
                renderQuestion();
                renderNav();
            } else {
                showResult();
            }
        }, 900);
    }

    // 显示结果
    function showResult() {
        document.getElementById("quizPage").style.display = "none";
        document.getElementById("resultPage").style.display = "block";
        document.getElementById("right").innerText = right;
        document.getElementById("wrong").innerText = wrong;
        document.getElementById("finalScore").innerText = score;

        // 全对显示大奖按钮
        if (wrong === 0) {
            document.getElementById("allRightBtn").style.display = "block";
        } else {
            document.getElementById("allRightBtn").style.display = "none";
        }
    }

    // 进入大奖
    function goToPrize() {
        document.getElementById("resultPage").style.display = "none";
        document.getElementById("prizePage").style.display = "block";
    }

    // 查看错题
    function showWrong() {
        document.getElementById("resultPage").style.display = "none";
        document.getElementById("wrongPage").style.display = "block";
        let box = document.getElementById("wrongList");
        box.innerHTML = "";

        if (wrongList.length === 0) {
            box.innerHTML = "<p>🎉 全部正确，没有错题！</p>";
            return;
        }

        wrongList.forEach((item, idx) => {
            let div = document.createElement("div");
            div.className = "wrong-item";
            div.innerHTML = `
                <p>${idx + 1}. ${item.q}</p>
                <p>你的答案：${item.user}</p>
                <p>正确答案：<b>${item.ans}</b></p>
            `;
            box.appendChild(div);
        });
    }

    // 返回结果
    function backToResult() {
        document.getElementById("wrongPage").style.display = "none";
        document.getElementById("resultPage").style.display = "block";
    }

    // 重新开始
    function restartQuiz() {
        document.getElementById("prizePage").style.display = "none";
        document.getElementById("resultPage").style.display = "none";
        document.getElementById("startPage").style.display = "block";
    }
</script>
</body>
</html>
