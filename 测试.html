<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界计算机发展史测验</title>
    <style>
        /* 全局样式：优雅的背景与排版 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 卡片容器 */
        .quiz-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .quiz-container:hover {
            transform: translateY(-5px);
        }

        /* 题目样式 */
        .question h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 30px;
            line-height: 1.5;
            border-left: 4px solid #764ba2;
            padding-left: 15px;
        }

        /* 选项列表 */
        .options-list {
            list-style: none;
            margin-bottom: 30px;
        }

        /* 单个选项样式 */
        .option-item {
            background: #f8f9fa;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            background: #f0e6ff;
            border-color: #d8b4fe;
        }

        .option-item input {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .option-item label {
            cursor: pointer;
            font-size: 16px;
            color: #444;
            width: 100%;
        }

        /* 选中状态 */
        input[type="radio"]:checked + label {
            color: #764ba2;
            font-weight: bold;
        }

        /* 按钮样式 */
        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background: linear-gradient(to right, #5a6edb, #6c3d8d);
        }

        /* 结果提示框 */
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .modal-content p {
            font-size: 18px;
            margin-bottom: 25px;
            color: #555;
        }

        .close-btn {
            padding: 10px 25px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="question">
        <h2>题目：世界上第一台计算机的英文名是什么？</h2>
    </div>
    <ul class="options-list" id="optionsList">
        <!-- 选项将通过JS动态生成 -->
    </ul>
    <button class="submit-btn" onclick="checkAnswer()">提交答案</button>
</div>

<!-- 结果弹窗 -->
<div class="result-modal" id="resultModal">
    <div class="modal-content">
        <h3 id="resultTitle"></h3>
        <p id="resultMessage"></p>
        <button class="close-btn" onclick="closeModal()">重新作答</button>
    </div>
</div>

<script>
    // 1. 定义题目数据
    const questionData = {
        question: "世界上第一台计算机的英文名是什么？",
        correctAnswer: "ENIAC",
        options: [
            { text: "ENIAC", isCorrect: true },
            { text: "UNIVAC", isCorrect: false },
            { text: "EDVAC", isCorrect: false },
            { text: "测试", isCorrect: false }
        ]
    };

    // 2. 打乱选项顺序 (Fisher-Yates 洗牌算法)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 3. 渲染页面
    function renderQuiz() {
        const optionsList = document.getElementById('optionsList');
        const shuffledOptions = shuffleArray([...questionData.options]); // 复制并打乱

        shuffledOptions.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'option-item';
            
            // 生成 A B C D 标识
            const labelText = String.fromCharCode(65 + index) + ". " + item.text;

            li.innerHTML = `
                <input type="radio" name="option" id="opt${index}" value="${item.text}">
                <label for="opt${index}">${labelText}</label>
            `;
            optionsList.appendChild(li);
        });
    }

    // 4. 检查答案
    function checkAnswer() {
        const selectedOption = document.querySelector('input[name="option"]:checked');
        const resultModal = document.getElementById('resultModal');
        const resultTitle = document.getElementById('resultTitle');
        const resultMessage = document.getElementById('resultMessage');

        if (!selectedOption) {
            alert("请选择一个选项！");
            return;
        }

        const userAnswer = selectedOption.value;
        
        if (userAnswer === questionData.correctAnswer) {
            // 答对
            resultTitle.style.color = "#4CAF50";
            resultTitle.innerText = "恭喜答对";
            resultMessage.innerText = `正确答案是：${questionData.correctAnswer}。\nENIAC（电子数字积分计算机）确实是世界上第一台通用电子数字计算机。`;
        } else {
            // 答错
            resultTitle.style.color = "#f44336";
            resultTitle.innerText = "答错了";
            resultMessage.innerText = `正确答案是：${questionData.correctAnswer}。\n再好好回忆一下，第一台计算机的名字很有纪念意义哦！`;
        }

        resultModal.style.display = "flex";
    }

    // 5. 关闭弹窗
    function closeModal() {
        document.getElementById('resultModal').style.display = "none";
        // 清除单选选择
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(radio => radio.checked = false);
    }

    // 初始化
    renderQuiz();
</script>

</body>
</html>
